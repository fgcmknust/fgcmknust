<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="Full Gospel Campus Ministry — KNUST. Worship, events, devotionals, and merch for our campus family." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Full Gospel Campus Ministry-KNUST</title>
    <link rel="icon" type="image/png" href="/images/FGCI LOGO.png" />

    <!-- Google Fonts: Playfair Display (headings) & Inter (body) -->
    <!--
      Loaded NON-render-blocking: a plain <link rel="stylesheet"> to a cross-origin
      font CSS blocks the render tree until it arrives, which inflated First Paint
      (~2s) / FCP (3.25s) for mobile users on slow links. The preload + media="print"
      onload swap lets the browser paint immediately (fallback text via display=swap)
      and apply the web fonts once they load. <noscript> keeps it working without JS.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" />
    <!-- media="print" so it does not block render; /boot.js flips it to "all" after load (replaces an inline onload=, which is blocked by CSP without 'unsafe-inline'). -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" media="print" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
    </noscript>

    <!-- Preload above-the-fold hero images so they render immediately.
         boot.js injects route-specific preloads for /register and /event-registration.
         The home-page hero (Laptop/phone) is always preloaded since / is the entry point.
         Store hero (merch/mobile-store) is preloaded for direct /store visits. -->
    <link rel="preload" as="image" href="/images/Laptop.webp" type="image/webp" media="(min-width: 768px)" fetchpriority="high" />
    <link rel="preload" as="image" href="/images/phone.webp" type="image/webp" media="(max-width: 767px)" fetchpriority="high" />
    <!--
      No api.paystack.co preconnect: the browser never contacts Paystack directly
      (the Worker calls Paystack server-side in /api/pay/*), so the preconnect just
      opened an unused TLS connection. Re-add only if the in-browser Paystack flow
      is re-enabled.
    -->
    <link rel="dns-prefetch" href="https://challenges.cloudflare.com" />

    <!--
      Early-boot helpers live in /boot.js so we can drop `'unsafe-inline'`
      from the CSP `script-src` directive. Loaded SYNCHRONOUSLY because:
        - the route-conditional preload must run before the hero image
          would have been auto-discovered;
        - the --mobile-vh CSS variable must be set before any CSS reads it;
        - the font media-swap listener must be attached before the print
          stylesheet finishes downloading.
      It's a few hundred bytes; the cost is negligible vs the LCP win.
    -->
    <script src="/boot.js"></script>

    <!-- Design System CSS -->
    <link rel="stylesheet" href="/src/index.css" />

    <!--
      GSAP & ScrollTrigger are bundled via npm now (see src/utils/animations.js).
      The cdnjs <script> tags lived here previously but shipped without SRI,
      so a CDN-side compromise would have meant attacker JS running on this
      origin. Bundled assets get a content hash from Vite and inherit the
      `script-src 'self'` rule in public/_headers, so we get integrity by
      construction.
    -->

    <!--
      Paystack InlineJS v2 — intentionally NOT loaded here.
      The active checkout uses the manual-payment flow; the Paystack/PaystackPop
      code in src/pages/cart.js is currently commented out, so loading this script
      globally downloaded + parsed a third-party script on every page for nothing.
      To re-enable Paystack: load it on demand inside the checkout handler (inject
      the script tag and await its onload before calling PaystackPop.setup), rather
      than blocking it on the global critical path again.
    -->

    <!--
      Lucide Icons are no longer loaded from a CDN. The full library shipped
      hundreds of icons for the ~34 we use; we now bundle only those via Vite
      (see src/utils/icons.js, which installs the same window.lucide API).
    -->
  </head>
  <body>
    <!-- App Mount Point -->
    <div id="app"></div>

    <!-- Main Entry Point (type=module already defers) -->
    <script type="module" src="/src/main.js"></script>

    <!--
      Cloudflare Web Analytics (privacy-first, no cookies).
      No `integrity="..."` attribute: Cloudflare rotates beacon.min.js as part
      of their own platform updates and does not publish a stable hash, so SRI
      would break the script on every Cloudflare-side push. Trust model: the
      beacon is hosted on a Cloudflare-owned subdomain that's already in our
      CSP `script-src` allowlist, and access to it is operationally tied to
      the same account that runs the site. We accept the residual risk.
    -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "ac3424ae4ef94751acc3a26b8e2cb315"}'></script>
    <!-- End Cloudflare Web Analytics -->
  </body>
</html>
